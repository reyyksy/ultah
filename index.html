<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎂 Buku Tamu Ulang Tahun</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">
        <!-- Bubbles dekorasi -->
        <div class="bubbles">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

        <!-- Kartu Utama -->
        <div class="card" id="card">
            <!-- SAMPUL (depan) -->
            <div class="card-front">
                <div class="envelope-icon"></div>
                <h1>📖</h1>
                <p class="subtitle">Web Ucapan Ulang Tahun</p>
                <button class="btn-open" id="openCard">Buka Kartu</button>
            </div>

            <!-- ISI (belakang) -->
            <div class="card-back" id="cardBack">
                <!-- Tab navigasi -->
                <div class="tab-nav">
                    <button class="tab-btn active" data-tab="kirim">✉️ Kirim Pesan</button>
                    <button class="tab-btn" data-tab="lihat">📋 Lihat Pesan</button>
                </div>

                <!-- Konten Tab: Kirim -->
                <div class="tab-content active" id="tabKirim">
                    <div class="form-group">
                        <label for="senderName">Nama (opsional)</label>
                        <input type="text" id="senderName" placeholder="Kosongkan jika ingin anonim" />
                    </div>
                    <div class="form-group">
                        <label for="messageText">Pesan Ucapan ✨</label>
                        <textarea id="messageText" rows="4" placeholder="Tulis ucapan manismu di sini..."></textarea>
                    </div>
                    <button class="btn-submit" id="submitMessage">Kirim Ucapan 💌</button>
                    <div id="submitFeedback" class="feedback"></div>
                </div>

                <!-- Konten Tab: Lihat -->
                <div class="tab-content" id="tabLihat">
                    <div class="message-list" id="messageList">
                        <!-- Akan diisi oleh JS -->
                        <p class="empty-state">Belum ada ucapan. Jadilah yang pertama! 🥳</p>
                    </div>
                </div>

                <!-- Footer dengan musik & credit -->
                <div class="card-footer">
                    <button class="btn-music" id="musicToggle">
                        <span class="music-icon">🔊</span> Putar Lagu
                    </button>
                    <span class="credit">— selamat ulang tahun, aku! —</span>
                </div>
            </div>
        </div>
    </div>

     <audio id="bgMusic" loop>
        <source src="assets/music.mp3" type="audio/mpeg" />
    </audio>

    <!-- PASTIKAN SUPABASE DI-LOAD SEBELUM script.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
